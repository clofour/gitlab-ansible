---

- name: Add Grafana key and repository
  ansible.builtin.deb822_repository:
    name: grafana
    types: deb
    uris: https://apt.grafana.com
    suites: stable
    components: main
    architectures: amd64
    signed_by: https://apt.grafana.com/gpg.key
    state: present

- name: Update repositories
  ansible.builtin.apt:
    update_cache: true

- name: Install Loki
  ansible.builtin.apt:
    name:
      - loki
    state: present

- name: Configure Loki
  ansible.builtin.template:
    src: templates/loki.yml.j2
    dest: "{{ grafana_loki_config_dir }}/loki.yml"
    owner: root
    group: loki
    mode: "0640" # TODO: Loki cannot read this configuration file
  notify: Restart Loki

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Start Loki
  ansible.builtin.service:
    name: loki
    state: started
    enabled: true

- name: Install Grafana
  ansible.builtin.apt:
    name: grafana
    state: present

- name: Configure Grafana
  ansible.builtin.template:
    src: templates/grafana.ini.j2
    dest: "{{ grafana_config_dir }}/grafana.ini"
    owner: root
    group: grafana
    mode: "0640"
  notify: Restart Grafana
  no_log: true

- name: Provision Grafana
  ansible.builtin.copy:
    src: files/provisioning
    dest: "{{ grafana_config_dir }}"
    owner: root
    group: grafana
    mode: "0640"
  notify: Restart Grafana

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Start Grafana
  ansible.builtin.service:
    name: grafana-server
    state: started
    enabled: true
